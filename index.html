<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FPS Modular Base</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="overlay">
    <h1>FPS base</h1>
    <p>•</p>
    <p>Clicca per iniziare</p>
    <p>
      W A S D = muovi • Shift = sprint • Spazio = salto • E = interagisci/raccogli •
      Q = drop • 1..5 slot • Tab inventario • ESC sblocca mouse
    </p>
  </div>

  <div id="crosshair"></div>
  <div id="hint"></div>

  <div id="inventory"></div>

  <div id="inventoryPanel" class="inv-panel hidden">
    <div class="inv-window">
      <div class="inv-title">Inventario</div>

      <div class="inv-section">
        <h3>Barra rapida (5)</h3>
        <div id="hotbarGrid" class="inv-grid"></div>
      </div>

      <div class="inv-section">
        <h3>Zaino (20)</h3>
        <div id="bagGrid" class="inv-grid"></div>
      </div>

      <div class="inv-footer">
        <span>Click: prendi/sposta stack</span>
        <span>TAB: chiudi</span>
      </div>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.161.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.161.0/examples/jsm/"
    }
  }
  </script>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
